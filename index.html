    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%,
        rgba(0, 0, 0, 0.25) 50%

      background-size: 100% 4px;
      z-index: 2;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(0, 255, 0, 0.1);
      z-index: 2;
      pointer-events: none;
      animation: scanline 8s linear infinite;
    }

    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      opacity: 0.03;
    }

    .matrix-char {
      position: absolute;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      animation: matrix 10s linear infinite;
    }

    #terminal {
      position: relative;
      z-index: 1;
      box-sizing: border-box;
      padding: 20px;
      height: 100%;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0, 0, 0, 0.8);
      text-shadow: 0 0 5px #0f0;
    }

    #terminal::-webkit-scrollbar {
      width: 10px;
    }

    #terminal::-webkit-scrollbar-track {
      background: #000;
    }

    #terminal::-webkit-scrollbar-thumb {
      background: #0f0;
      box-shadow: 0 0 10px #0f0;
    }

    .input-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .prompt {
      margin-right: 5px;
      animation: textGlow 2s ease-in-out infinite;
    }

    .cmdline {
      background: none;
      border: none;
      outline: none;
      color: inherit;
      flex: 1;
      font-family: inherit;
      font-size: inherit;
      width: 100%;
      caret-color: #0f0;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #0f0;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    a {
      color: #0f0;
      text-decoration: underline;
      word-break: break-all;
      transition: all 0.3s;
    }

    a:hover {
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
    }

    pre.banner {

      font-size: 12px;
      animation: glitch 5s infinite;
      text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
      line-height: 1.2;
    }

    .typewriter {
      overflow: hidden;
      white-space: nowrap;
      animation: typing 2s steps(40, end);
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    .output-line {
      margin: 5px 0;
      line-height: 1.6;
    }

    .glow-text {
      animation: textGlow 3s ease-in-out infinite;
    }

    @media (max-width: 768px) {
      html, body {
        font-size: 14px;
      }
      pre.banner {
        font-size: 8px;
      }
      #terminal {
        padding: 10px;
      }
    }
  </style>

    // Matrix background effect
    function createMatrixRain() {
      const matrixBg = document.getElementById('matrixBg');
      const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';

    function appendLine(text = '', className = '') {
      const line = document.createElement('div');
      line.className = `output-line ${className}`;
      line.innerHTML = text;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function appendPre(text, isBanner = false) {
      const pre = document.createElement('pre');
      pre.className = isBanner ? 'banner' : 'output-line';
      pre.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, (match) => {
        return `<a href="${match}" target="_blank" rel="noopener noreferrer">${match}</a>`;
      });
      terminal.appendChild(pre);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function newPrompt() {
      const line = document.createElement('div');
      line.classList.add('input-line');
      const promptSpan = document.createElement('span');
      promptSpan.classList.add('prompt');
      promptSpan.textContent = promptText;
      const input = document.createElement('input');
      input.classList.add('cmdline');
      input.autofocus = true;
      line.append(promptSpan, input);
      terminal.appendChild(line);
      input.focus();
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          handleInput(e);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            input.value = commandHistory[commandHistory.length - 1 - historyIndex];
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex > 0) {
            historyIndex--;
            input.value = commandHistory[commandHistory.length - 1 - historyIndex];
          } else if (historyIndex === 0) {
            historyIndex = -1;
            input.value = '';
          }
        } else if (e.key === 'Tab') {
          e.preventDefault();
          const partial = input.value.toLowerCase();
          const matches = Object.keys(data).filter(cmd => cmd.startsWith(partial));
          if (matches.length === 1) {
            input.value = matches[0];
          } else if (matches.length > 1) {
            appendLine(`\nPossible commands: ${matches.join(', ')}`);
            newPrompt();
            input.value = partial;
          }
        }
      });
    }

    function handleInput(e) {
      const input = e.target;
      const cmd = input.value.trim().toLowerCase();
      input.disabled = true;
      
      if (cmd) {
        commandHistory.push(cmd);
        historyIndex = -1;
      }

      if (cmd === 'clear') {
        terminal.innerHTML = '';
        showBanner();
        appendLine("System initialized. Type 'ls' or 'help' to see available commands.\n", 'glow-text');
        newPrompt();
        return;
      }
      
      if (data.hasOwnProperty(cmd)) {
        appendPre(data[cmd]);
      } else if (cmd === '') {
        // Do nothing for empty command
      } else {
        appendLine(`bash: ${cmd}: command not found`);
        appendLine(`Type 'ls' or 'help' for available commands.`);
      }
      
      newPrompt();
    }
